project:
  name: tracemind-android
  version: "{{Env.TRACEMIND_SDK_PUBLISH_VERSION}}"
  languages:
    java:
      groupId: io.github.wolf3c.tracemind
      artifactId: tracemind-android

signing:
  active: ALWAYS
  pgp:
    active: ALWAYS
    armored: true

deploy:
  maven:
    mavenCentral:
      tracemind:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        namespace: io.github.wolf3c
        stagingRepositories:
          - sdk/android/build/maven-staging
