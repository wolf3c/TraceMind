name: SDK Publish

"on":
  push:
    tags:
      - "tracemind-release-*"

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish npm SDKs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - server_node
          - mcp_node
          - react_native
          - mini_program
          - browser_extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm publish CLI
        run: npm install --prefix "$RUNNER_TEMP/tracemind-npm" npm@11.6.2
      - name: Stage package
        run: node scripts/stage-sdk-registry-package.js --sdk "${{ matrix.sdk }}" --out ".sdk-publish/${{ matrix.sdk }}"
      - name: Read package identity
        id: package
        run: |
          node -e 'const p=require("./.sdk-publish/${{ matrix.sdk }}/package.json"); console.log(`name=${p.name}`); console.log(`version=${p.version}`)' >> "$GITHUB_OUTPUT"
      - name: Check existing package
        id: exists
        continue-on-error: true
        run: node "$RUNNER_TEMP/tracemind-npm/node_modules/npm/bin/npm-cli.js" view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version
      - name: Publish package
        if: steps.exists.outcome != 'success'
        run: node "$RUNNER_TEMP/tracemind-npm/node_modules/npm/bin/npm-cli.js" publish ".sdk-publish/${{ matrix.sdk }}" --access public
      - name: Verify package
        run: node "$RUNNER_TEMP/tracemind-npm/node_modules/npm/bin/npm-cli.js" view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version

  pypi:
    name: Publish PyPI SDKs
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - server_python
          - mcp_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - name: Stage package
        run: node scripts/stage-sdk-registry-package.js --sdk "${{ matrix.sdk }}" --out ".sdk-publish/${{ matrix.sdk }}"
      - name: Build distribution
        run: python -m build ".sdk-publish/${{ matrix.sdk }}"
      - name: Read package identity
        id: package
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path(".sdk-publish/${{ matrix.sdk }}/pyproject.toml").read_text())
          print(f"name={data['project']['name']}")
          print(f"version={data['project']['version']}")
          PY
      - name: Check existing package
        id: exists
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, sys, urllib.error, urllib.request
          url = "https://pypi.org/pypi/${{ steps.package.outputs.name }}/${{ steps.package.outputs.version }}/json"
          try:
              urllib.request.urlopen(url, timeout=20).read()
          except urllib.error.HTTPError as exc:
              sys.exit(1 if exc.code == 404 else 2)
          PY
      - name: Publish package
        if: steps.exists.outcome != 'success'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ".sdk-publish/${{ matrix.sdk }}/dist"
      - name: Verify package
        run: |
          python - <<'PY'
          import time, urllib.request

          url = "https://pypi.org/pypi/${{ steps.package.outputs.name }}/${{ steps.package.outputs.version }}/json"
          for attempt in range(18):
              try:
                  urllib.request.urlopen(url, timeout=20).read()
                  break
              except Exception:
                  if attempt == 17:
                      raise
                  time.sleep(10)
          PY

  android:
    name: Publish Android SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Read Android version
        id: package
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const manifest = require('./sdk/release_manifest.json');
          const sdk = manifest.sdks.find((entry) => entry.sdkName === 'android');
          console.log(`version=${sdk.registry.packageVersion}`);
          console.log(`coordinate=${sdk.registry.packageName}`);
          NODE
      - name: Check Maven Central package
        id: exists
        continue-on-error: true
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          curl -fsSL "https://repo1.maven.org/maven2/io/github/wolf3c/tracemind/tracemind-android/${VERSION}/tracemind-android-${VERSION}.pom" >/dev/null
      - name: Require Maven Central credentials
        if: steps.exists.outcome != 'success'
        run: |
          test -n "${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}"
          test -n "${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}"
          test -n "${{ secrets.GPG_PUBLIC_KEY }}"
          test -n "${{ secrets.GPG_SIGNING_KEY }}"
          test -n "${{ secrets.GPG_SIGNING_PASSWORD }}"
      - name: Publish GPG public key
        if: steps.exists.outcome != 'success'
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        run: |
          public_key_file="$RUNNER_TEMP/tracemind-gpg-public-key.asc"
          printf '%s\n' "$GPG_PUBLIC_KEY" > "$public_key_file"
          gpg --batch --import "$public_key_file"
          fingerprint="$(gpg --batch --with-colons --import-options show-only --import "$public_key_file" | awk -F: '/^fpr:/ { print $10; exit }')"
          test -n "$fingerprint"
          gpg --batch --keyserver hkps://keyserver.ubuntu.com --send-keys "$fingerprint" || true
          verify_home="$(mktemp -d)"
          chmod 700 "$verify_home"
          for attempt in $(seq 1 12); do
            if GNUPGHOME="$verify_home" gpg --batch --quiet --keyserver hkps://keyserver.ubuntu.com --recv-keys "$fingerprint" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          GNUPGHOME="$verify_home" gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys "$fingerprint"
      - name: Stage Maven publication
        if: steps.exists.outcome != 'success'
        working-directory: sdk/android
        env:
          TRACEMIND_SDK_PUBLISH_VERSION: ${{ steps.package.outputs.version }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew publishReleasePublicationToTraceMindStagingRepository
      - name: Publish to Maven Central
        if: steps.exists.outcome != 'success'
        uses: jreleaser/release-action@v2
        with:
          arguments: deploy --config-file sdk/android/jreleaser.yml
        env:
          TRACEMIND_SDK_PUBLISH_VERSION: ${{ steps.package.outputs.version }}
          JRELEASER_PROJECT_VERSION: ${{ steps.package.outputs.version }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSWORD }}
      - name: Verify package
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          URL="https://repo1.maven.org/maven2/io/github/wolf3c/tracemind/tracemind-android/${VERSION}/tracemind-android-${VERSION}.pom"
          for attempt in $(seq 1 60); do
            curl -fsSL "$URL" >/dev/null && exit 0
            sleep 10
          done
          curl -fsSL "$URL" >/dev/null
