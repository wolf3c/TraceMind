name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Meteor
        run: |
          METEOR_RELEASE="$(cut -d@ -f2 .meteor/release)"
          curl -fsSL "https://install.meteor.com/?release=${METEOR_RELEASE}" | sh
          echo "$HOME/.meteor" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run test:sdk-release
      - run: npm run test:deploy-gates
      - run: npx svelte-check
      - run: npm test
